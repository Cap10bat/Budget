        table { width: 100%; border-collapse: collapse; background: #fff; }
        th { background: #edf2f7; color: #4a5568; font-size: 8.5px; text-transform: uppercase; padding: 5px 6px; text-align: left; border-bottom: 1px solid #cbd5e0; }

            { id: "m106", month: "December 2026", date: "Dec 22", owner: "BOO", desc: "Home Internet Bill Auto-Pay", acct: "boo", amt: -70.00 },
            { id: "m107", month: "December 2026", date: "Dec 25", owner: "BOO", desc: "Monthly Paycheck Hits", acct: "boo", amt: 3000.00, isPayday: true },
            { id: "m108", month: "December 2026", date: "Dec 25", owner: "BOO", desc: "Pay Monthly Rent Installment", acct: "boo", amt: -2000.00 },
            { id: "m109", month: "December 2026", date: "Dec 25", owner: "BOO", desc: "Phone Bill Auto-Draft", acct: "boo", amt: -231.00 },
            { id: "m110", month: "December 2026", date: "Dec 28", owner: "ME", desc: "Credit Card Payment", acct: "me", amt: -50.00 },
            { id: "m111", month: "December 2026", date: "Dec 31", owner: "BOTH", desc: "Year-End Balance Reconciliation Audit", acct: "me", amt: 0.00 }
        ];
            
                  let checkState = JSON.parse(localStorage.getItem('budget_checkState')) || {};
        let amountOverrides = JSON.parse(localStorage.getItem('budget_amtOverrides')) || {};
        let dayEndTotals = JSON.parse(localStorage.getItem('budget_dayEndTotals')) || {};
        let regularExpenses = JSON.parse(localStorage.getItem('budget_regularExpenses')) || {};

        function saveState() {
            localStorage.setItem('budget_checkState', JSON.stringify(checkState));
            localStorage.setItem('budget_amtOverrides', JSON.stringify(amountOverrides));
            localStorage.setItem('budget_dayEndTotals', JSON.stringify(dayEndTotals));
            localStorage.setItem('budget_regularExpenses', JSON.stringify(regularExpenses));
        }
                  function calculateBalances() {
            let runningBoo = initialBalances.boo;
            let runningMe = initialBalances.me;
            let checkingLowestDip = initialBalances.me;
            let currentOverdraftFixNeeded = 0;

            ledgerData.forEach(item => {
                let exactAmt = amountOverrides[item.id] !== undefined ? amountOverrides[item.id] : item.amt;
                let targetAcct = item.acct.toLowerCase();
                
                if (item.isPayday) {
                    let fields = item.owner === "ME" ? ['cig', 'gas', 'beer'] : ['groceries', 'vape', 'gas'];
                    fields.forEach(f => {
                        let val = parseFloat(regularExpenses[`${item.id}-${f}`]) || 0;
                        exactAmt -= val;
                    });
                }

                if (targetAcct === "me") {
                    runningMe += exactAmt;
                    // Ignore the initial pre-payday past overdraft deficit from July 15-16
                    if (item.id !== "m1" && item.id !== "m2" && runningMe < checkingLowestDip) {
                        checkingLowestDip = runningMe;
                    }
                } else if (targetAcct === "boo" || targetAcct === "both") {
                    runningBoo += exactAmt;
                }
                
                item.projectedBoo = runningBoo;
                item.projectedMe = runningMe;
            });

            let safeToSpend = runningMe;
            if (checkingLowestDip < 0) {
                currentOverdraftFixNeeded = Math.abs(checkingLowestDip);
                safeToSpend = 0;
            } else {
                safeToSpend = checkingLowestDip;
            }
                                let liveStandings = { boo: initialBalances.boo, me: initialBalances.me };
            ledgerData.forEach(item => {
                let isChecked = checkState[item.id] || false;
                let exactAmt = amountOverrides[item.id] !== undefined ? amountOverrides[item.id] : item.amt;
                let targetAcct = item.acct.toLowerCase();
                
                if (isChecked) {
                    if (targetAcct === "me") liveStandings.me += exactAmt;
                    else if (targetAcct === "boo" || targetAcct === "both") liveStandings.boo += exactAmt;
                }
                
                if (item.isPayday) {
                    let fields = item.owner === "ME" ? ['cig', 'gas', 'beer'] : ['groceries', 'vape', 'gas'];
                    fields.forEach(f => {
                        let val = parseFloat(regularExpenses[`${item.id}-${f}`]) || 0;
                        if (item.owner === "ME") liveStandings.me -= val;
                        else liveStandings.boo -= val;
                    });
                }
            });

            document.getElementById('bal-boo').innerText = `$${liveStandings.boo.toFixed(2)}`;
            document.getElementById('bal-me').innerText = `$${liveStandings.me.toFixed(2)}`;
            
            let safeEl = document.getElementById('tool-safe');
            safeEl.innerText = `$${safeToSpend.toFixed(2)}`;
            safeEl.className = safeToSpend > 0 ? "tool-val pos" : "tool-val neg";

            let fixEl = document.getElementById('tool-fix');
            if (currentOverdraftFixNeeded > 0) {
                fixEl.innerText = `Transfer $${currentOverdraftFixNeeded.toFixed(2)}`;
                fixEl.className = "tool-val warn";
            } else {
                fixEl.innerText = "Healthy ($0.00)";
                fixEl.className = "tool-val pos";
            }
        }

        function clearAppData() {
            if (confirm("Clear tracking checkboxes? Custom numbers remain completely saved.")) {
                checkState = {}; regularExpenses = {}; saveState(); buildUI(); calculateBalances();
            }
        }
                  function buildUI() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = "";
            const months = [...new Set(ledgerData.map(item => item.month))];

            months.forEach(month => {
                const section = document.createElement('div');
                section.className = "month-box";
                
                let monthItems = ledgerData.filter(item => item.month === month);
                let monthlyNetSavingsFlow = 0;
                monthItems.forEach(i => {
                    let exact = amountOverrides[i.id] !== undefined ? amountOverrides[i.id] : i.amt;
                    monthlyNetSavingsFlow += exact;
                });
                let prefix = monthlyNetSavingsFlow >= 0 ? "+" : "";

                section.innerHTML = `
                    <div class="month-header-flex">
                        <div class="month-title">${month}</div>
                        <div class="month-analysis" style="color: ${monthlyNetSavingsFlow >= 0 ? '#68d391' : '#fc8181'}">
                            Net Flow: ${prefix}$${monthlyNetSavingsFlow.toFixed(2)}
                        </div>
                    </div>
                `;

                let table = document.createElement('table');
                table.innerHTML = `<thead><tr><th class="col-chk"></th><th class="col-dt">Date</th><th class="col-own">Own</th><th>Details</th><th class="col-amt">Amount</th></tr></thead><tbody></tbody>`;
                let tbody = table.querySelector('tbody');
                              monthItems.forEach(item => {
                    let tr = document.createElement('tr');
                    let isChecked = checkState[item.id] || false;
                    if (isChecked) tr.className = "checked-row";

                    let displayAmt = amountOverrides[item.id] !== undefined ? amountOverrides[item.id] : item.amt;
                    let amtClass = displayAmt >= 0 ? "pos" : "neg";

                    let myProj = item.projectedMe || 0;
                    let booProj = item.projectedBoo || 0;

                    let myProjClass = myProj >= 0 ? "pos" : "neg";
                    let booProjClass = booProj >= 0 ? "pos" : "neg";

                    let rowWarningAlertHtml = "";
                    if (myProj < 0 && item.acct.toLowerCase() === "me") {
                        rowWarningAlertHtml = `class="proj-badge-danger"`;
                    }

                    // Render everyday regular expense input blocks under payday cycles
                    let dynamicVarInputsHtml = "";
                    if (item.isPayday) {
                        if (item.owner === "ME") {
                            let valCig = regularExpenses[`${item.id}-cig`] || "";
                            let valGas = regularExpenses[`${item.id}-gas`] || "";
                            let valBeer = regularExpenses[`${item.id}-beer`] || "";
                            dynamicVarInputsHtml = `
                                <div class="var-box-grid">
                                    <div class="var-input-group"><span class="var-label">Cigs</span><input type="number" placeholder="$0" class="var-field" data-key="${item.id}-cig" value="${valCig}"></div>
                                    <div class="var-input-group"><span class="var-label">Gas</span><input type="number" placeholder="$0" class="var-field" data-key="${item.id}-gas" value="${valGas}"></div>
                                    <div class="var-input-group"><span class="var-label">Beer</span><input type="number" placeholder="$0" class="var-field" data-key="${item.id}-beer" value="${valBeer}"></div>
                                </div>
                            `;
                        } else {
                            let valGroc = regularExpenses[`${item.id}-groceries`] || "";
                            let valVape = regularExpenses[`${item.id}-vape`] || "";
                            let valGas = regularExpenses[`${item.id}-gas`] || "";
                            dynamicVarInputsHtml = `
                                <div class="var-box-grid">
                                    <div class="var-input-group"><span class="var-label">Groceries</span><input type="number" placeholder="$0" class="var-field" data-key="${item.id}-groceries" value="${valGroc}"></div>
                                    <div class="var-input-group"><span class="var-label">Vape</span><input type="number" placeholder="$0" class="var-field" data-key="${item.id}-vape" value="${valVape}"></div>
                                    <div class="var-input-group"><span class="var-label">Gas</span><input type="number" placeholder="$0" class="var-field" data-key="${item.id}-gas" value="${valGas}"></div>
                                </div>
                            `;
                        }
                    }

                    tr.innerHTML = `
                        <td class="col-chk"><input type="checkbox" id="chk-${item.id}" ${isChecked ? 'checked' : ''}></td>
                        <td class="col-dt">${item.date}</td>
                        <td class="col-own">${item.owner}</td>
                        <td>
                            <div style="font-weight: 600;">${item.desc}</div>
                            <div class="proj-container" ${rowWarningAlertHtml}>
                                <div class="proj-line"><span class="proj-name">Your Checking Proj:</span><span class="${myProjClass}">$${myProj.toFixed(2)}</span></div>
                                <div class="proj-line"><span class="proj-name">Boo Account Proj:</span><span class="${booProjClass}">$${booProj.toFixed(2)}</span></div>
                            </div>
                            ${dynamicVarInputsHtml}
                        </td>
                        <td class="col-amt"><input type="number" id="amt-${item.id}" value="${displayAmt}" step="0.01" class="${amtClass}"></td>
                    `;
                                                    tr.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
                        checkState[item.id] = e.target.checked;
                        tr.className = e.target.checked ? "checked-row" : "";
                        saveState(); calculateBalances();
                    });

                    tr.querySelector('input[type="number"]:not(.var-field)').addEventListener('input', (e) => {
                        let val = parseFloat(e.target.value) || 0;
                        amountOverrides[item.id] = val;
                        e.target.className = val >= 0 ? "pos" : "neg";
                        saveState(); calculateBalances();
                    });

                    // Event configurations to track fluid inputs inside variable grids
                    tr.querySelectorAll('.var-field').forEach(input => {
                        input.addEventListener('input', (e) => {
                            let k = e.target.getAttribute('data-key');
                            regularExpenses[k] = e.target.value;
                            saveState(); calculateBalances();
                        });
                    });

                    tbody.appendChild(tr);
                });

                section.appendChild(table);
                let footer = document.createElement('div');
                footer.className = "day-end-box";
                let cachedDayEnd = dayEndTotals[month] || "";
                footer.innerHTML = `<span>Verify Day-End Statement Total:</span><input type="text" class="day-end-input" id="dayend-${month.replace(/\s+/g, '')}" placeholder="$0.00" value="${cachedDayEnd}">`;
                footer.querySelector('input').addEventListener('input', (e) => { dayEndTotals[month] = e.target.value; saveState(); });
                section.appendChild(footer);
                container.appendChild(section);
            });
        }

        // Initialize App Calculations First to Populate Data Vectors
        calculateBalances();
        buildUI();
    </script>
</body>
</html>
